<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reading Library – Langsnack Korean</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
 <style> 
  :root {
    --cream:    #f9f6f1;
    --white:    #ffffff;
    --sage:     #7a9e7e;
    --sage-d:   #5a7d5e;
    --sage-l:   #eaf2eb;
    --warm:     #e8e0d5;
    --tan:      #c9b99a;
    --tan-l:    #f5f0e8;
    --text:     #2d2d2d;
    --muted:    #7a7060;
    --gold:     #c9973a;
    --gold-l:   #fdf3e0;
    --red:      #c0544a;
    --red-l:    #faeae9;
    --shadow:   0 4px 20px rgba(0,0,0,0.07);
    --radius:   18px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }
  #story-body,
#story-kr-title,
.vocab-card .vc-kr,
.word,
.blank {
    font-family: 'Nanum Gothic', sans-serif;
}

.dialogue-line{
    font-family:'Nanum Myeongjo', serif !important;
    color:#555;
    font-style:italic;
     font-weight:600;
    margin:0.15em 0;
}

.dialogue-line .word{
    font-family:inherit;
}

  /* ── HEADER ── */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--warm);
    padding: 0 28px;
  }
  .header-inner {
    max-width: 880px;
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'DM Sans', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--sage-d);
    letter-spacing: -.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo .dot { color: var(--gold); }
  .header-tag {
    font-size: .78rem;
    font-weight: 600;
    color: var(--muted);
    background: var(--tan-l);
    border: 1px solid var(--warm);
    border-radius: 20px;
    padding: 5px 14px;
    letter-spacing: .3px;
  }

  /* ── PAGE WRAPPER ── */
  .page { max-width: 880px; margin: 0 auto; padding: 36px 20px 60px; }

  /* ── SELECTOR ── */
  .page-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .page-sub {
    font-size: .9rem;
    color: var(--muted);
    margin-bottom: 26px;
  }

  .filter-row {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .filter-input, .filter-select {
    font-family: inherit;
    font-size: .9rem;
    background: var(--white);
    border: 1.5px solid var(--warm);
    border-radius: 14px;
    padding: 11px 14px;
    color: var(--text);
    box-shadow: var(--shadow);
  }
  .filter-input { flex: 1 1 240px; }
  .filter-select { flex: 0 1 180px; cursor: pointer; }
  .empty-state {
    background: var(--white);
    border: 1.5px solid var(--warm);
    border-radius: var(--radius);
    padding: 24px;
    color: var(--muted);
    box-shadow: var(--shadow);
  }
  .story-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .story-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 22px 18px 18px;
    cursor: pointer;
    border: 1.5px solid var(--warm);
    box-shadow: var(--shadow);
    transition: transform .18s, box-shadow .18s, border-color .18s;
  }
  .story-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 32px rgba(0,0,0,0.10);
    border-color: var(--sage);
  }
  .story-card .s-emoji { font-size: 2.2rem; display: block; margin-bottom: 10px; }
  .story-card .s-kr { font-size: 1rem; font-weight: 700; color: var(--text); }
  .story-card .s-en { font-size: .78rem; color: var(--muted); margin-top: 3px; }
  .story-card .s-badge {
    display: inline-block;
    margin-top: 12px;
    font-size: .7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--sage-l);
    color: var(--sage-d);
    letter-spacing: .2px;
  }

  /* ── READER ── */
  #reader { display: none; flex-direction: column; gap: 18px; }
  #reader.visible { display: flex; }

  .panel {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px 30px;
    border: 1.5px solid var(--warm);
    box-shadow: var(--shadow);
  }

  /* story text */
  .story-meta {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  #story-kr-title {
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }
  #story-en-title {
    font-size: .95rem;
    color: var(--muted);
  }
  #story-body {
    font-size: 1.18rem;
    line-height: 2.4;
    color: var(--text);
    word-break: keep-all;
  }
  #story-body .word {
    cursor: pointer;
    border-radius: 5px;
    padding: 1px 2px;
    border-bottom: 2px solid transparent;
    transition: background .13s, border-color .13s;
  }
  #story-body {
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
}
  #story-body .word:hover { background: var(--gold-l); border-bottom-color: var(--gold); }
  #story-body .word.hi { background: var(--gold-l); border-bottom-color: var(--gold); font-weight: 600; }

  .trans-row { margin-top: 16px; }
  .trans-btn {
    font-family: inherit;
    font-size: .82rem;
    font-weight: 600;
    color: var(--sage-d);
    background: var(--sage-l);
    border: 1px solid #c2d9c4;
    border-radius: 20px;
    padding: 6px 16px;
    cursor: pointer;
    transition: background .14s;
  }
  .trans-btn:hover { background: #d5ead7; }
  #story-translation {
    display: none;
    margin-top: 12px;
    font-size: .92rem;
    color: var(--muted);
    line-height: 1.8;
    background: var(--tan-l);
    border-left: 3px solid var(--tan);
    border-radius: 0 10px 10px 0;
    padding: 12px 16px;
  }
  #story-translation.show { display: block; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; }
  .tab-btn {
    font-family: inherit;
    font-size: .85rem;
    font-weight: 600;
    background: var(--tan-l);
    color: var(--muted);
    border: 1.5px solid var(--warm);
    border-radius: 20px;
    padding: 7px 18px;
    cursor: pointer;
    transition: all .14s;
  }
  .tab-btn.active { background: var(--sage); color: #fff; border-color: var(--sage); }

  /* ── VOCAB ── */
  .vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 10px; }
  .vocab-card {
    background: var(--cream);
    border: 1.5px solid var(--warm);
    border-radius: 14px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color .14s, transform .14s, background .14s;
  }
  .vocab-card:hover, .vocab-card.active {
    border-color: var(--sage);
    background: var(--sage-l);
    transform: translateY(-2px);
  }
  .vocab-card .vc-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .vocab-card .vc-emoji { font-size: 1.3rem; }
  .vocab-card .vc-kr { font-size: 1.05rem; font-weight: 700; color: var(--sage-d); margin-top: 6px; }
  .vocab-card .vc-rom { display:none; }
  .vocab-card .vc-en { font-size: .8rem; color: #555; margin-top: 6px; line-height: 1.3; }

  /* ── QUIZ ── */
  .quiz-status { font-size: .8rem; color: var(--muted); margin-bottom: 10px; letter-spacing: .2px; }
  #quiz-question {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .quiz-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .qopt {
    font-family: inherit;
    font-size: .9rem;
    font-weight: 500;
    background: var(--cream);
    border: 1.5px solid var(--warm);
    border-radius: 12px;
    padding: 11px 14px;
    cursor: pointer;
    color: var(--text);
    text-align: left;
    line-height: 1.4;
    transition: all .13s;
  }
  .qopt:hover { background: var(--sage-l); border-color: var(--sage); }
  .qopt.correct { background: #e6f5e8; border-color: var(--sage); color: var(--sage-d); font-weight: 700; }
  .qopt.wrong { background: var(--red-l); border-color: var(--red); color: var(--red); }
  #quiz-feedback { margin-top: 12px; font-size: .95rem; font-weight: 600; min-height: 22px; }
  .fb-ok { color: var(--sage-d); }
  .fb-no { color: var(--red); }
  #quiz-next {
    display: none;
    margin-top: 12px;
    font-family: inherit;
    font-size: .88rem;
    font-weight: 600;
    background: var(--sage);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 9px 22px;
    cursor: pointer;
    transition: background .14s;
  }
  #quiz-next:hover { background: var(--sage-d); }
  #quiz-score { font-size: .82rem; color: var(--muted); margin-top: 8px; }

  /* ── CLOZE ── */
  .cloze-hint { font-size: .82rem; color: var(--muted); margin-bottom: 14px; }
  #cloze-text { font-size: 1.1rem; line-height: 2.8; color: var(--text); word-break: keep-all; }
  .blank {
    display: inline-block;
    border: none;
    border-bottom: 2px solid var(--sage);
    width: 76px;
    font-size: .98rem;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--sage-d);
    background: transparent;
    outline: none;
    text-align: center;
    padding: 1px 4px;
    margin: 0 3px;
    font-weight: 700;
    transition: border-color .13s;
  }
  .blank.correct { border-color: var(--sage); color: var(--sage-d); }
  .blank.wrong { border-color: var(--red); color: var(--red); }
  #cloze-check {
    margin-top: 16px;
    font-family: inherit;
    font-size: .88rem;
    font-weight: 600;
    background: var(--gold);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 9px 22px;
    cursor: pointer;
    transition: background .14s;
  }
  #cloze-check:hover { background: #b07e28; }
  #cloze-result { margin-top: 10px; font-size: .9rem; font-weight: 600; min-height: 20px; }

  /* ── NAV ── */
  .nav-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .nav-btn {
    font-family: inherit;
    font-size: .85rem;
    font-weight: 600;
    border: 1.5px solid var(--warm);
    border-radius: 20px;
    padding: 9px 20px;
    cursor: pointer;
    transition: all .14s;
    background: var(--white);
    color: var(--text);
  }
  .nav-btn:hover { border-color: var(--sage); color: var(--sage-d); background: var(--sage-l); }
  .nav-btn.primary { background: var(--sage); color: #fff; border-color: var(--sage); }
  .nav-btn.primary:hover { background: var(--sage-d); border-color: var(--sage-d); }
  #story-counter { font-size: .82rem; color: var(--muted); font-weight: 500; }

  /* ── TOOLTIP ── */
  #tt {
    position: fixed;
    background: var(--text);
    color: #fff;
    border-radius: 10px;
    padding: 9px 13px;
    font-size: .82rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity .13s;
    z-index: 9999;
    max-width: 200px;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    line-height: 1.5;
  }
  #tt.on { opacity: 1; }
  #tt .t-kr { font-size: .98rem; font-weight: 700; color: #f5d37a; }
  #tt .t-rom { display:none; }
  #tt .t-en { font-size: .8rem; margin-top: 3px; color: #eee; }

  @media(max-width:580px){
    .panel { padding: 20px 16px; }
    .quiz-opts { grid-template-columns: 1fr; }
    #story-kr-title { font-size: 1.35rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">LANGSNACK<span class="dot">.</span></div>
    <div class="header-tag">Reading Practice · 읽기 연습</div>
  </div>
</header>

<!-- SELECTOR -->
<div class="page" id="selector-page">
  <div class="page-title">Reading Library</div>
  <div class="page-sub">Click a story to start reading </div>
  <div class="filter-row">
    <input class="filter-input" id="story-search" type="search" placeholder="Search stories... 제목이나 주제로 검색" />
    <select class="filter-select" id="level-filter">
      <option value="all">All difficulties</option>
    </select>

  </div>
  <div class="story-grid" id="story-grid"></div>
</div>

<!-- READER -->
<div class="page" id="reader-page" style="display:none">
  <div id="reader">

    <div class="nav-row">
      <button class="nav-btn" onclick="backToMenu()">← All Stories</button>
      <span id="story-counter"></span>
    </div>

    <!-- Story -->
    <div class="panel">
      <div class="story-meta">
        <div id="story-kr-title"></div>
        <div id="story-en-title"></div>
      </div>
      <div id="story-body"></div>
      <div class="trans-row">
        <button class="trans-btn" onclick="toggleTrans()"> Show / Hide English Translation</button>
      </div>
      <div id="story-translation"></div>
    </div>

    <!-- Activities -->
    <div class="panel">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('vocab')">📖 Vocabulary</button>
        <button class="tab-btn" onclick="showTab('quiz')">❓ Quiz</button>
        <button class="tab-btn" onclick="showTab('cloze')">✏️ Fill In</button>
      </div>

      <div id="tab-vocab">
        <div class="vocab-grid" id="vocab-grid"></div>
      </div>

      <div id="tab-quiz" style="display:none">
        <div class="quiz-status" id="quiz-status"></div>
        <div id="quiz-question"></div>
        <div class="quiz-opts" id="quiz-opts"></div>
        <div id="quiz-feedback"></div>
        <button id="quiz-next" onclick="nextQ()">Next →</button>
        <div id="quiz-score"></div>
      </div>

      <div id="tab-cloze" style="display:none">
        <p class="cloze-hint">빈칸에 알맞은 단어를 쓰세요 — Fill each blank with the correct Korean word.</p>
        <div id="cloze-text"></div>
        <button id="cloze-check" onclick="checkCloze()">Check answers 정답 확인</button>
        <div id="cloze-result"></div>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prev-btn" onclick="nav(-1)">← Previous</button>
      <button class="nav-btn primary" id="next-btn" onclick="nav(1)">Next Story →</button>
    </div>

  </div>
</div>

<div id="tt"><div class="t-kr" id="tt-kr"></div><div class="t-rom" id="tt-rom"></div><div class="t-en" id="tt-en"></div></div>

<script>
let STORIES = [];
let filteredStories = [];


// ── state
let idx=0, qIdx=0, qScore=0, qAnswered=false, transOpen=false;

// ── boot
async function boot(){
  const g=document.getElementById('story-grid');
  try{
    const response = await fetch('stories.json');
    if(!response.ok) throw new Error('Could not load stories.json');
    STORIES = await response.json();
    filteredStories = [...STORIES];
    setupFilters();
    applyFilters();
  }catch(err){
    g.innerHTML = `<div class="empty-state">Could not load stories. Make sure <b>stories.json</b> is uploaded in the same GitHub folder as <b>index.html</b>.</div>`;
    console.error(err);
  }
}

function setupFilters(){
  const levelFilter=document.getElementById('level-filter');
  const search=document.getElementById('story-search');

  const preferredLevels=['Starter','Beginner','High Beginner','Intermediate','High Intermediate','Advanced'];
  const existingLevels=[...new Set(STORIES.map(s=>s.level).filter(Boolean))];
  preferredLevels.filter(level=>existingLevels.includes(level)).forEach(level=>{
    const opt=document.createElement('option');
    opt.value=level;
    opt.textContent=level;
    levelFilter.appendChild(opt);
  });
  existingLevels
    .filter(level=>!preferredLevels.includes(level))
    .sort()
    .forEach(level=>{
      const opt=document.createElement('option');
      opt.value=level;
      opt.textContent=level;
      levelFilter.appendChild(opt);
    });

  levelFilter.addEventListener('change', applyFilters);
  search.addEventListener('input', applyFilters);
}

function applyFilters(){
  const level=document.getElementById('level-filter').value;
  const term=document.getElementById('story-search').value.trim().toLowerCase();

  filteredStories = STORIES.filter(s=>{
    const matchesLevel = level==='all' || s.level===level;
    const searchable = [s.krTitle, s.enTitle, s.level, ...(s.sentences||[]).map(x=>x.kr), ...(s.sentences||[]).map(x=>x.en)].join(' ').toLowerCase();
    const matchesSearch = !term || searchable.includes(term);
    return matchesLevel && matchesSearch;
  });
  renderStoryGrid(filteredStories);
}

function renderStoryGrid(list){
  const g=document.getElementById('story-grid');
  g.innerHTML='';
  if(!list.length){
    g.innerHTML='<div class="empty-state">No stories found. Try another level or search term.</div>';
    return;
  }
  list.forEach(s=>{
    const storyIndex=STORIES.findIndex(item=>item.id===s.id);
    const c=document.createElement('div');
    c.className='story-card';
    c.innerHTML=`<div class="s-kr">${s.krTitle}</div><div class="s-en">${s.enTitle}</div><span class="s-badge">${s.level}</span>`;
    c.onclick=()=>open(storyIndex);
    g.appendChild(c);
  });
}


function escapeHTML(str){
  return String(str ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[ch]));
}

function escapeAttr(str){
  return String(str ?? '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

function makeStoryHtml(text, vocab){
  const items=[...(vocab||[])].map(v=>({kr:v.kr,en:v.en})).sort((a,b)=>b.kr.length-a.kr.length);
  let out='';
  let i=0;
  while(i<text.length){
    const match=items.find(v=>text.startsWith(v.kr, i));
    if(match){
      out += `<span class="word" data-kr="${escapeHTML(match.kr)}" data-en="${escapeHTML(match.en)}" onclick="clickWord(this)">${escapeHTML(match.kr)}</span>`;
      i += match.kr.length;
    }else{
      out += escapeHTML(text[i]);
      i++;
    }
  }
  return out;
}

function open(i){
  idx=i; transOpen=false;
  document.getElementById('selector-page').style.display='none';
  document.getElementById('reader-page').style.display='block';
  document.getElementById('reader').classList.add('visible');
  load(i); showTab('vocab');
  window.scrollTo({top:0,behavior:'smooth'});
}

function backToMenu(){
  document.getElementById('reader-page').style.display='none';
  document.getElementById('selector-page').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function load(i){
  const s=STORIES[i];
  document.getElementById('story-counter').textContent=`${s.id} / ${STORIES.length}`;
  document.getElementById('story-kr-title').textContent=s.krTitle;
  document.getElementById('story-en-title').textContent=s.enTitle;

  // build story
  const body=document.getElementById('story-body');
const isDialogue = s.sentences.some(sent => sent.kr.includes(':'));

body.innerHTML = s.sentences.map(sent => {
  const text = makeStoryHtml(sent.kr, s.vocab);

  if (
    sent.kr.startsWith('학생 1:') ||
    sent.kr.startsWith('학생 2:') ||
    sent.kr.startsWith('민수:') ||
    sent.kr.startsWith('지수:') ||
    sent.kr.startsWith('수진:') ||
    sent.kr.startsWith('유진:') ||
    sent.kr.startsWith('민지:') ||
    sent.kr.startsWith('미나:') ||
    sent.kr.startsWith('할머니:') ||
    sent.kr.startsWith('선생님:') ||
    sent.kr.startsWith('준호:')
  ) {
return `<div class="dialogue-line">${text}</div>`;
  }

  return text;
}).join(' ');

  // vocab
  document.getElementById('vocab-grid').innerHTML=s.vocab.map(v=>
    `<div class="vocab-card" onclick="clickVocab('${escapeAttr(v.kr)}',this)">
      <div class="vc-kr">${escapeHTML(v.kr)}</div>
      <div class="vc-en">${escapeHTML(v.en)}</div>
    </div>`).join('');

  qIdx=0; qScore=0; renderQ();
  renderCloze();

  const visibleList = filteredStories.length ? filteredStories : STORIES;
  const visiblePos = visibleList.findIndex(item=>item.id===s.id);
  document.getElementById('prev-btn').style.visibility=visiblePos<=0?'hidden':'visible';
  document.getElementById('next-btn').style.visibility=visiblePos===visibleList.length-1?'hidden':'visible';
}

function toggleTrans(){
  transOpen=!transOpen;
  document.getElementById('story-translation').classList.toggle('show',transOpen);
}

// tooltip
const tt=document.getElementById('tt');
document.getElementById('story-body').addEventListener('mouseover',e=>{
  const w=e.target.closest('.word'); if(!w){tt.classList.remove('on');return;}
  document.getElementById('tt-kr').textContent=w.dataset.kr;

  document.getElementById('tt-en').textContent=w.dataset.en;
  tt.classList.add('on');
});
document.getElementById('story-body').addEventListener('mousemove',e=>{
  tt.style.left=(e.clientX-tt.offsetWidth/2)+'px';
  tt.style.top=(e.clientY-tt.offsetHeight-16)+'px';
});
document.getElementById('story-body').addEventListener('mouseout',()=>tt.classList.remove('on'));

function clickWord(el){
  document.querySelectorAll('.word.hi').forEach(w=>w.classList.remove('hi'));
  el.classList.add('hi');
  document.querySelectorAll('.vocab-card').forEach(c=>c.classList.remove('active'));
  const kr=el.dataset.kr;
  document.querySelectorAll('.vocab-card').forEach(c=>{
    if(c.querySelector('.vc-kr')?.textContent===kr) c.classList.add('active');
  });
  showTab('vocab');
}

function clickVocab(kr,el){
  document.querySelectorAll('.word.hi').forEach(w=>w.classList.remove('hi'));
  document.querySelectorAll('.vocab-card').forEach(c=>c.classList.remove('active'));
  const w=document.querySelector(`[data-kr="${CSS.escape(kr)}"]`);
  if(w){w.classList.add('hi');w.scrollIntoView({behavior:'smooth',block:'center'});}
  el.classList.add('active');
}

function showTab(t){
  ['vocab','quiz','cloze'].forEach((n,i)=>{
    document.getElementById('tab-'+n).style.display=n===t?'block':'none';
    document.querySelectorAll('.tab-btn')[i].classList.toggle('active',n===t);
  });
}

// quiz
function renderQ(){
  const s=STORIES[idx];
  if(qIdx>=s.quiz.length){
    document.getElementById('quiz-question').innerHTML='🎉 퀴즈 완료! Quiz complete!';
    document.getElementById('quiz-opts').innerHTML='';
    document.getElementById('quiz-feedback').innerHTML='';
    document.getElementById('quiz-score').textContent=`Score: ${qScore} / ${s.quiz.length}`;
    document.getElementById('quiz-next').style.display='none';
    document.getElementById('quiz-status').textContent='';
    return;
  }
  const q=s.quiz[qIdx]; qAnswered=false;
  document.getElementById('quiz-status').textContent=`Question ${qIdx+1} / ${s.quiz.length}`;
  document.getElementById('quiz-question').innerHTML=q.q.replace('\n','<br>');
  document.getElementById('quiz-feedback').innerHTML='';
  document.getElementById('quiz-score').textContent=`Score: ${qScore}`;
  document.getElementById('quiz-next').style.display='none';
  document.getElementById('quiz-opts').innerHTML=q.opts.map((o,i)=>
    `<button class="qopt" onclick="answerQ(${i})">${o}</button>`).join('');
}

function answerQ(i){
  if(qAnswered)return; qAnswered=true;
  const q=STORIES[idx].quiz[qIdx];
  document.querySelectorAll('.qopt').forEach((b,j)=>{
    if(j===q.ans)b.classList.add('correct');
    else if(j===i)b.classList.add('wrong');
    b.disabled=true;
  });
  const fb=document.getElementById('quiz-feedback');
  if(i===q.ans){qScore++;fb.innerHTML='<span class="fb-ok">✓ 정답! Correct!</span>';}
  else fb.innerHTML=`<span class="fb-no">✗ 정답 / Answer: <b>${q.opts[q.ans]}</b></span>`;
  document.getElementById('quiz-score').textContent=`Score: ${qScore}`;
  document.getElementById('quiz-next').style.display='inline-block';
}
function nextQ(){qIdx++;renderQ();}

// cloze
function renderCloze(){
  const s=STORIES[idx];
  let html=s.sentences.map(x=>x.kr).join(' ');
  s.cloze.forEach((w,i)=>{
    html=html.replace(w,`<input class="blank" data-ans="${w}" id="b${i}" type="text" autocomplete="off" spellcheck="false" placeholder="___"/>`);
  });
  document.getElementById('cloze-text').innerHTML=html;
  document.getElementById('cloze-result').textContent='';
}

function checkCloze(){
  const inputs=document.querySelectorAll('.blank'); let ok=0;
  inputs.forEach(b=>{
    b.classList.remove('correct','wrong');
    if(b.value.trim()===b.dataset.ans){b.classList.add('correct');ok++;}
    else b.classList.add('wrong');
  });
  const r=document.getElementById('cloze-result');
  if(ok===inputs.length) r.innerHTML=`<span style="color:var(--sage-d)">🎉 오~ 잘 했어요! All ${ok} correct!</span>`;
  else r.innerHTML=`<span style="color:var(--gold)">${ok} / ${inputs.length} — 아이고..다시 해보세요! Try again.</span>`;
}

function nav(d){
  const visibleList = filteredStories.length ? filteredStories : STORIES;
  const currentId = STORIES[idx]?.id;
  const pos = visibleList.findIndex(item=>item.id===currentId);
  const target = visibleList[pos+d];
  if(!target)return;
  const n = STORIES.findIndex(item=>item.id===target.id);
  open(n);
}

boot();
</script>
